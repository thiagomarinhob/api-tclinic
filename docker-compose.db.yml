services:
  postgres:
    image: postgres:16-alpine
    container_name: solutions-clinic-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solutions_clinic}
      POSTGRES_USER: ${POSTGRES_USER:-solutions_clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-solutions_clinic}\" -d \"${POSTGRES_DB:-solutions_clinic}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - solutions-network

volumes:
  postgres_data:

networks:
  solutions-network:
    name: solutions-network
    driver: bridge
