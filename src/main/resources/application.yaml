server:
  port: ${PORT:8080}

spring:
  application:
    name: solutions-clinic
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:solutions_clinic}
    username: ${POSTGRES_USER:solutions_clinic}
    password: ${POSTGRES_PASSWORD:solutions_clinic}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    repair-on-migrate: true
    default-schema: public

security:
  token:
    secret: ${SECURITY_TOKEN_SECRET}
  jwt:
    issuer: ${SECURITY_JWT_ISSUER:solutions-clinic}
    audience: ${SECURITY_JWT_AUDIENCE:}
    jwk-set-uri: ${SECURITY_JWT_JWK_SET_URI:}

stripe:
  api:
    key: ${STRIPE_API_KEY:}
    secret: ${STRIPE_API_SECRET:}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}
    success:
      path: ${STRIPE_WEBHOOK_SUCCESS_PATH:/plan-selection/success}
    cancel:
      path: ${STRIPE_WEBHOOK_CANCEL_PATH:/plan-selection}

whatsapp:
  webhook:
    verify-token: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
  api:
    access-token: ${WHATSAPP_ACCESS_TOKEN}
    version: ${WHATSAPP_API_VERSION:v25.0}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID}

resend:
  api:
    key: ${RESEND_API_KEY}
  from: ${RESEND_FROM_EMAIL}

memed:
  api:
    key: ${MEMED_API_KEY}
    url: ${MEMED_API_URL:https://integrations.api.memed.com.br/v1}
  secret:
    key: ${MEMED_SECRET_KEY}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  trial:
    duration:
      days: ${TRIAL_DURATION_DAYS:14}
  r2:
    account-id: ${R2_ACCOUNT_ID}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket-name: ${R2_BUCKET_NAME:clinic-bucket}
