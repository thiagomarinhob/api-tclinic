services:
  postgres-evolution-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:?EVOLUTION_DB_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - postgres_evolution_data:/var/lib/postgresql/data

  evolution-go:
    image: evoapicloud/evolution-go:latest
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      CLIENT_NAME: evolution
      GLOBAL_API_KEY: ${EVOLUTION_API_KEY:?EVOLUTION_API_KEY is required}
      POSTGRES_AUTH_DB: postgresql://postgres:${EVOLUTION_DB_PASSWORD:-evolution_pass}@postgres-evolution-db:5432/evogo_auth?sslmode=disable
      POSTGRES_USERS_DB: postgresql://postgres:${EVOLUTION_DB_PASSWORD:-evolution_pass}@postgres-evolution-db:5432/evogo_users?sslmode=disable
      DATABASE_SAVE_MESSAGES: "false"
      WADEBUG: INFO
      LOGTYPE: console
    depends_on:
      - postgres-evolution-db
    restart: unless-stopped
    networks:
      - solutions-network
      - default

volumes:
  postgres_evolution_data:

networks:
  solutions-network:
    external: true